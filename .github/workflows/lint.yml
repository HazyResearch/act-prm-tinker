name: Lint

on:
  push:
    branches: [main, cc, "cc/**"]
  pull_request:
    branches: [main, cc]

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --only-group dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
