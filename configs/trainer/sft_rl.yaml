# SFT Warmup + RL Training config
# Phase 1: SFT warmup on static data, Phase 2: RL policy gradient
trainer_name: sft_rl

fp32_loss: false

# --- SFT Warmup Phase ---
sft_warmup_steps: 50
sft_mini_batch_size: 1
sft_gradient_accumulation_steps: 1
sft_eval_every: 10
sft_save_every: 50

# --- RL Phase ---
# Generation (Sampling Rollouts)
num_batches: 200
num_tries: 1
eval_num_tries: 1
max_tokens: 1024
temperature: 1.0

batch_size: 16
group_size: 8
eval_group_size: 1

# Training (Policy Updates)
learning_rate: 4e-5
discount_factor: 1.0
loss_fn: "importance_sampling"
num_substeps: 1
mini_batch_size: null

compute_post_kl: false
kl_penalty_coef: 0.0
kl_discount_factor: 0.0

# Checkpointing
eval_every: 10
save_every: 20
best_metric: "final_reward"

# Generation + save
save_rollouts_every: 0

# Other
hide_observations: false
hidden_obs_content: "..."
first_obs_to_show: 2
last_obs_to_show: 1

tool_call_kwargs:
  tool_call_bos: "<tool_call>"
  tool_call_eos: "</tool_call>"
  tool_call_argname: "arguments"

base_url: null
log_path: "./logs"
load_checkpoint_path: null
checkpoint_path: "./checkpoints"
lora_checkpoint_path: "./checkpoints_lora"

wandb_project: null
wandb_name: null
