name: "snorkel_finance"
is_async: false

dataset_config:
  path: "snorkelai/agent-finance-reasoning"
  split: "train"

grader_model_config:
  name: "hf_transformer"
  is_async: false
  model_config:
    pretrained_model_name_or_path: "Qwen/Qwen3-8B"
grader_model_samples: 1
grader_model_verbose: false

hide_observations: false
hidden_obs_content: "..."
first_obs_to_show: 2
last_obs_to_show: 1

num_fewshot_prompts: 0
num_train_samples: 100
num_val_samples: 30
num_test_samples: 37

max_turns: 50
num_tries: 1
eval_num_tries: 1
seed: 0
split: "train"
system_prompt: null  # uses default from prompts.py
truncation_message: "Sorry, you have reached the maximum number of steps. Please try again."
verbose: false
