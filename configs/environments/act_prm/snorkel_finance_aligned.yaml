# Snorkel Finance reasoning traces, split-aligned with online snorkel_finance env
# Splits match configs/environments/snorkel_finance/default.yaml (seed=0, train=290, eval=30, test=37)
# Dataset: mzio/aprm-snorkelai_agent_finance_reasoning-aligned
name: "act_prm"
is_async: false
dataset_config:
  path: "mzio/aprm-snorkelai_agent_finance_reasoning-aligned"
  split: "train"

success_rollouts_only: true
actions_only: true

hide_observations: false
hidden_obs_content: "..."
first_obs_to_show: 2
last_obs_to_show: 1

num_fewshot_prompts: 0
action_bos: "<tool_call>"
action_eos: "</tool_call>"
final_answer_bos: "Final Answer: "

# All 290 train tasks available; use data_seed for reproducible shuffle
num_train_samples: 250
num_val_samples: 40
num_test_samples: 0

max_turns: 20
num_tries: 1
eval_num_tries: 1
seed: 0
split: "train"
system_prompt: "You are a helpful assistant that infers reasoning thoughts behind your own observed actions."
original_system_prompt: "You are a helpful assistant."
truncation_message: "Sorry, you have reached the maximum number of steps. Please try again."
verbose: false
