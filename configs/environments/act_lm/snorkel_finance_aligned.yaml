# Snorkel Finance reasoning traces for SFT, split-aligned with online snorkel_finance env
# Splits match configs/environments/snorkel_finance/default.yaml (seed=0, train=290, eval=30, test=37)
# Dataset: mzio/aprm-snorkelai_agent_finance_reasoning-aligned
#
# Uses train HF split for training, eval HF split for evaluation.
# Test split (37 tasks) held out — matches the online env's test split.
name: "action_lm"
is_async: false
dataset_config:
  path: "mzio/aprm-snorkelai_agent_finance_reasoning-aligned"
  split: "train"

fp32_loss: false
loss_on_past_assistant_messages: true

actions_only: false
build_full_states: true
best_actions_only: false
best_halves_only: false
success_only: true

hide_observations: false
hidden_obs_content: "..."
first_obs_to_show: 2
last_obs_to_show: 1

num_fewshot_prompts: 0
action_bos: "<tool_call>"
action_eos: "</tool_call>"
final_answer_bos: "Final Answer: "

num_eval_gen_samples: null
num_eval_rollout_samples: null
frac_train_tasks: 0.85
frac_eval_tasks: 0.15

max_turns: null
num_tries: 1
eval_num_tries: 1
seed: 0
data_seed: 0
split: "train"
system_prompt: "You are a helpful tool-calling assistant."
original_system_prompt: "You are a helpful tool-calling assistant."
truncation_message: "Sorry, you have reached the maximum number of steps. Please try again."
verbose: false
