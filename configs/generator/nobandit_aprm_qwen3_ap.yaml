# Act-PRM NoBandit Generator for Qwen3 LLMs
# Runs N independent full rollouts instead of bandit-style best-of-N at each step
# Enables proper discounted returns across the full episode
name: "nobandit_action_prompt_act_prm"
reward_method: "action_probs"
discount_factor: 1.0
mean_center: false
verbose: false
streamer: false

action_bos: "<tool_call>"
action_eos: "</tool_call>"
thought_bos: "<thought>"
thought_eos: "</thought>"
final_answer_bos: "Final Answer: "
